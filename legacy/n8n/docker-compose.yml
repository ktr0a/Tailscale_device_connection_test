services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-automation
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_HOST=<PI-TAILSCALE-IP>
      - WEBHOOK_URL=http://<PI-TAILSCALE-IP>:5678/
    volumes:
      - ./n8n_data:/home/node/.n8n
